<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Прогнозирование дефолта по кредитной карте</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Segoe UI', sans-serif;
        background: #f0f4f8;
        color: #333;
      }
      header {
        background: #1a3c5e;
        color: white;
        padding: 20px 40px;
      }
      header h1 {
        font-size: 1.4em;
        font-weight: 600;
      }
      header p {
        font-size: 0.85em;
        opacity: 0.8;
        margin-top: 4px;
      }
      .container {
        max-width: 900px;
        margin: 30px auto;
        padding: 0 20px;
      }
      .card {
        background: white;
        border-radius: 12px;
        padding: 28px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .card h2 {
        font-size: 1em;
        color: #1a3c5e;
        margin-bottom: 18px;
        border-bottom: 2px solid #e8f0fe;
        padding-bottom: 10px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }
      .field label {
        display: block;
        font-size: 0.75em;
        color: #666;
        margin-bottom: 4px;
        font-weight: 500;
      }
      .field input,
      .field select {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #dde3ec;
        border-radius: 6px;
        font-size: 0.9em;
        outline: none;
        transition: border 0.2s;
      }
      .field input:focus,
      .field select:focus {
        border-color: #1a3c5e;
      }
      .btn {
        width: 100%;
        background: #1a3c5e;
        color: white;
        border: none;
        padding: 14px;
        border-radius: 8px;
        font-size: 1em;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #254d78;
      }
      .result {
        display: none;
        text-align: center;
        padding: 20px;
        border-radius: 10px;
      }
      .result.default {
        background: #fff0f0;
        border: 2px solid #e53935;
      }
      .result.no-default {
        background: #f0fff4;
        border: 2px solid #43a047;
      }
      .result .verdict {
        font-size: 1.6em;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .result.default .verdict {
        color: #e53935;
      }
      .result.no-default .verdict {
        color: #43a047;
      }
      .result .prob {
        font-size: 0.95em;
        color: #555;
      }
      .result .risk {
        display: inline-block;
        margin-top: 10px;
        padding: 4px 14px;
        border-radius: 20px;
        font-size: 0.85em;
        font-weight: 600;
      }
      .risk-high {
        background: #fce4e4;
        color: #c62828;
      }
      .risk-med {
        background: #fff8e1;
        color: #f57f17;
      }
      .risk-low {
        background: #e8f5e9;
        color: #2e7d32;
      }
      .error {
        color: #e53935;
        font-size: 0.85em;
        text-align: center;
        margin-top: 10px;
        display: none;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Прогнозирование риска дефолта по кредитной карте</h1>
      <p>Нейросетевая модель на основе датасета UCI Default of Credit Card Clients</p>
    </header>
    <div class="container">
      <div class="card">
        <h2>Данные клиента</h2>
        <div class="grid">
          <div class="field">
            <label>Кредитный лимит (LIMIT_BAL)</label
            ><input type="number" id="LIMIT_BAL" value="50000" />
          </div>
          <div class="field">
            <label>Пол (1=муж, 2=жен)</label
            ><select id="SEX">
              <option value="1">1 — Мужской</option>
              <option value="2" selected>2 — Женский</option>
            </select>
          </div>
          <div class="field">
            <label>Образование (1-4)</label
            ><select id="EDUCATION">
              <option value="1">1 — Аспирантура</option>
              <option value="2" selected>2 — Университет</option>
              <option value="3">3 — Школа</option>
              <option value="4">4 — Другое</option>
            </select>
          </div>
          <div class="field">
            <label>Семейное положение (1-3)</label
            ><select id="MARRIAGE">
              <option value="1" selected>1 — Женат/замужем</option>
              <option value="2">2 — Холост/не замужем</option>
              <option value="3">3 — Другое</option>
            </select>
          </div>
          <div class="field"><label>Возраст</label><input type="number" id="AGE" value="30" /></div>
          <div class="field">
            <label>Статус оплаты PAY_0</label><input type="number" id="PAY_0" value="0" />
          </div>
          <div class="field">
            <label>Статус оплаты PAY_2</label><input type="number" id="PAY_2" value="0" />
          </div>
          <div class="field">
            <label>Статус оплаты PAY_3</label><input type="number" id="PAY_3" value="0" />
          </div>
          <div class="field">
            <label>Статус оплаты PAY_4</label><input type="number" id="PAY_4" value="0" />
          </div>
          <div class="field">
            <label>Статус оплаты PAY_5</label><input type="number" id="PAY_5" value="0" />
          </div>
          <div class="field">
            <label>Статус оплаты PAY_6</label><input type="number" id="PAY_6" value="0" />
          </div>
          <div class="field">
            <label>Сумма счёта BILL_AMT1</label><input type="number" id="BILL_AMT1" value="10000" />
          </div>
          <div class="field">
            <label>Сумма счёта BILL_AMT2</label><input type="number" id="BILL_AMT2" value="9000" />
          </div>
          <div class="field">
            <label>Сумма счёта BILL_AMT3</label><input type="number" id="BILL_AMT3" value="8000" />
          </div>
          <div class="field">
            <label>Сумма счёта BILL_AMT4</label><input type="number" id="BILL_AMT4" value="7000" />
          </div>
          <div class="field">
            <label>Сумма счёта BILL_AMT5</label><input type="number" id="BILL_AMT5" value="6000" />
          </div>
          <div class="field">
            <label>Сумма счёта BILL_AMT6</label><input type="number" id="BILL_AMT6" value="5000" />
          </div>
          <div class="field">
            <label>Оплата PAY_AMT1</label><input type="number" id="PAY_AMT1" value="1000" />
          </div>
          <div class="field">
            <label>Оплата PAY_AMT2</label><input type="number" id="PAY_AMT2" value="1000" />
          </div>
          <div class="field">
            <label>Оплата PAY_AMT3</label><input type="number" id="PAY_AMT3" value="1000" />
          </div>
          <div class="field">
            <label>Оплата PAY_AMT4</label><input type="number" id="PAY_AMT4" value="1000" />
          </div>
          <div class="field">
            <label>Оплата PAY_AMT5</label><input type="number" id="PAY_AMT5" value="1000" />
          </div>
          <div class="field">
            <label>Оплата PAY_AMT6</label><input type="number" id="PAY_AMT6" value="1000" />
          </div>
        </div>
      </div>

      <button class="btn" onclick="predict()">Предсказать риск дефолта</button>
      <div class="error" id="error">Ошибка при обращении к серверу</div>

      <div class="card" style="margin-top: 20px">
        <div class="result" id="result">
          <div class="verdict" id="verdict"></div>
          <div class="prob" id="prob"></div>
          <div class="risk" id="risk"></div>
        </div>
      </div>
    </div>
    <script>
      async function predict() {
        const fields = [
          'LIMIT_BAL',
          'SEX',
          'EDUCATION',
          'MARRIAGE',
          'AGE',
          'PAY_0',
          'PAY_2',
          'PAY_3',
          'PAY_4',
          'PAY_5',
          'PAY_6',
          'BILL_AMT1',
          'BILL_AMT2',
          'BILL_AMT3',
          'BILL_AMT4',
          'BILL_AMT5',
          'BILL_AMT6',
          'PAY_AMT1',
          'PAY_AMT2',
          'PAY_AMT3',
          'PAY_AMT4',
          'PAY_AMT5',
          'PAY_AMT6',
        ]
        const data = {}
        fields.forEach((f) => (data[f] = parseFloat(document.getElementById(f).value)))

        try {
          const res = await fetch('/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
          })
          const json = await res.json()
          document.getElementById('error').style.display = 'none'
          const el = document.getElementById('result')
          el.style.display = 'block'
          el.className = 'result ' + (json.prediction === 'Дефолт' ? 'default' : 'no-default')
          document.getElementById('verdict').textContent = json.prediction
          document.getElementById('prob').textContent = `Вероятность дефолта: ${(
            json.probability * 100
          ).toFixed(1)}%`
          const riskEl = document.getElementById('risk')
          riskEl.textContent = `Уровень риска: ${json.risk_level}`
          riskEl.className =
            'risk ' +
            (json.risk_level === 'Высокий'
              ? 'risk-high'
              : json.risk_level === 'Средний'
              ? 'risk-med'
              : 'risk-low')
        } catch (e) {
          document.getElementById('error').style.display = 'block'
        }
      }
    </script>
  </body>
</html>
